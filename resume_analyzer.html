<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Analyzer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f4f6fb;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 18px 40px rgba(4, 40, 84, 0.12);
      padding: 28px;
    }

    h1 {
      margin-top: 0;
      color: #1f3a8a;
    }

    textarea {
      width: 100%;
      min-height: 280px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      padding: 14px;
      resize: vertical;
      font-family: inherit;
      font-size: 15px;
      margin-bottom: 16px;
    }

    input[type="file"] {
      margin-bottom: 16px;
    }

    button {
      background: #2563eb;
      border: none;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .result {
      margin-top: 24px;
      padding: 18px;
      border-radius: 12px;
      background: #eef2ff;
      border: 1px solid #c7d2fe;
    }

    .result h2 {
      margin-top: 0;
    }

    .result p, .result ul {
      margin: 0 0 12px;
    }

    .result ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Resume Analyzer</h1>
    <p>Paste your resume text below, or upload a plain text resume file to analyze skills, contact details, education and experience.</p>

    <input type="file" id="resumeFile" accept=".txt" />
    <textarea id="resumeText" placeholder="Paste resume text here..."></textarea>
    <button id="analyzeButton">Analyze Resume</button>

    <div id="analysis" class="result" hidden>
      <h2>Analysis Result</h2>
      <div id="summary"></div>
      <div id="skills"></div>
      <div id="contact"></div>
      <div id="education"></div>
      <div id="experience"></div>
    </div>
  </div>

  <script>
    const resumeFile = document.getElementById('resumeFile');
    const resumeText = document.getElementById('resumeText');
    const analyzeButton = document.getElementById('analyzeButton');
    const analysis = document.getElementById('analysis');
    const summary = document.getElementById('summary');
    const skillsOutput = document.getElementById('skills');
    const contact = document.getElementById('contact');
    const education = document.getElementById('education');
    const experience = document.getElementById('experience');

    const skillKeywords = [
      'javascript','python','java','c++','c#','sql','html','css','react','angular','vue','node','express','django','flask','aws','azure','gcp','docker','kubernetes','git','rest','api','machine learning','data analysis','excel','project management','agile','scrum'
    ];

    resumeFile.addEventListener('change', async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const text = await file.text();
      resumeText.value = text;
    });

    analyzeButton.addEventListener('click', () => {
      const text = resumeText.value.trim();
      if (!text) {
        alert('Please paste resume text or upload a text file.');
        return;
      }
      const normalized = text.replace(/\r\n/g, '\n');
      displayAnalysis(normalized);
    });

    function displayAnalysis(text) {
      const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
      summary.innerHTML = `<p><strong>Detected name:</strong> ${extractName(lines)}</p>`;
      contact.innerHTML = generateContactSection(text);
      skillsOutput.innerHTML = generateSkillSection(text);
      education.innerHTML = generateEducationSection(text);
      experience.innerHTML = generateExperienceSection(text);
      analysis.hidden = false;
    }

    function extractName(lines) {
      if (!lines.length) return 'Unknown';
      const firstLine = lines[0];
      if (/resume|curriculum vitae|cv/i.test(firstLine)) {
        return lines[1] || 'Unknown';
      }
      return firstLine;
    }

    function generateContactSection(text) {
      const emailMatch = text.match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/ig) || [];
      const phoneMatch = text.match(/(?:\+?\d{1,3}[\s-\.])?(?:\(?\d{3}\)?[\s-\.]?\d{3}[\s-\.]?\d{4}|\d{10})/g) || [];
      return `
        <h3>Contact</h3>
        <p><strong>Email:</strong> ${[...new Set(emailMatch)].join(', ') || 'Not found'}</p>
        <p><strong>Phone:</strong> ${[...new Set(phoneMatch)].join(', ') || 'Not found'}</p>
      `;
    }

    function generateSkillSection(text) {
      const normalized = text.toLowerCase();
      const found = skillKeywords.filter(skill => normalized.includes(skill));
      if (!found.length) {
        return '<h3>Skills</h3><p>No recognized skills found.</p>';
      }
      const unique = [...new Set(found)];
      return `<h3>Skills</h3><ul>${unique.map(skill => `<li>${skill}</li>`).join('')}</ul>`;
    }

    function generateEducationSection(text) {
      const degreeRegex = /(bachelor|master|phd|associate|mba|msc|b\.sc|m\.sc|bs|ms|doctorate|diploma)/ig;
      const institutionRegex = /(university|college|institute|school|academy)/ig;
      const lines = text.split('\n');
      const items = lines.filter(line => degreeRegex.test(line) || institutionRegex.test(line));
      if (!items.length) {
        return '<h3>Education</h3><p>No education section detected.</p>';
      }
      return `<h3>Education</h3><ul>${items.slice(0, 8).map(line => `<li>${line}</li>`).join('')}</ul>`;
    }

    function generateExperienceSection(text) {
      const lines = text.split('\n');
      const experienceLines = [];
      const experienceKeywords = ['experience','worked','responsible','led','managed','developed','designed','implemented','project','consultant'];
      for (const line of lines) {
        const lower = line.toLowerCase();
        if (experienceKeywords.some(keyword => lower.includes(keyword))) {
          experienceLines.push(line);
        }
      }
      if (!experienceLines.length) {
        return '<h3>Experience</h3><p>No experience section detected.</p>';
      }
      return `<h3>Experience</h3><ul>${experienceLines.slice(0, 10).map(line => `<li>${line}</li>`).join('')}</ul>`;
    }
  </script>
</body>
</html>
